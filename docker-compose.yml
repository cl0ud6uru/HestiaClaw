networks:
  edge:
    external: true
    name: edge

services:
  neo4j:
    image: neo4j:2026-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hestia-neo4j-password}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  graphiti:
    image: zepai/knowledge-graph-mcp:latest
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-hestia-neo4j-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./graphiti_mcp_server.py:/app/mcp/src/graphiti_mcp_server.py:ro
      - ./graphiti_config.yaml:/app/mcp/config/config.yaml:ro
    expose:
      - "8000"
    depends_on:
      neo4j:
        condition: service_healthy

  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    command: ["ha-mcp-web"]
    environment:
      HOMEASSISTANT_URL: "${HA_URL}"
      HOMEASSISTANT_TOKEN: "${HA_TOKEN}"
      ENABLE_WEBSOCKET: "true"
      LOG_LEVEL: "INFO"
    restart: unless-stopped

  hestia:
    build: .
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ./agent.config.json:/app/agent.config.json
      - hestia_data:/app/data
      - ./skills:/app/skills:ro
    expose:
      - "3001"
    networks:
      - default
      - edge
    depends_on:
      - graphiti
      - ha-mcp

volumes:
  neo4j_data:
  hestia_data:
