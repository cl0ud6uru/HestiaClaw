# Development dependencies only — Neo4j + Graphiti run in Docker, app runs natively.
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   npm run dev

services:
  neo4j:
    image: neo4j:2026-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hestia-neo4j-password}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  graphiti:
    image: zepai/graphiti-mcp:latest
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-hestia-neo4j-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8001:8000"
    depends_on:
      neo4j:
        condition: service_healthy

  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    command: ["ha-mcp-web"]
    ports:
      - "8002:8086"
    environment:
      HOMEASSISTANT_URL: "${HA_URL}"
      HOMEASSISTANT_TOKEN: "${HA_TOKEN}"
      ENABLE_WEBSOCKET: "true"
      LOG_LEVEL: "INFO"
    restart: unless-stopped

volumes:
  neo4j_data:
