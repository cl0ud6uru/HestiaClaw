name: HestiaClaw Graphiti
version: "2.0.0"
slug: hestiaclaw_graphiti
description: Graphiti MCP server with built-in Neo4j. One add-on for long-term memory — no separate Neo4j add-on needed.
url: https://github.com/cl0ud6uru/hestiaclaw
arch:
  - amd64
  - aarch64

startup: services
boot: auto
init: false
timeout: 300

host_network: true

map:
  - data:rw

options:
  password: "changeme"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  openai_api_key: ""
  anthropic_api_key: ""

schema:
  password: password
  llm_provider: list(openai|anthropic)
  llm_model: str
  openai_api_key: password
  anthropic_api_key: password
